name: Backport

# Cherry-picks a merged master PR onto a maintained release branch. Add a label
# like `backport release/trino-479` to a PR before (or after) merge; on merge,
# this opens a PR that applies the same commits to that branch. Used to ship a
# fix to a still-supported older Trino line after master has moved on.
#
# The opened backport PR still needs its connector version bumped (releases are
# immutable) so the release/trino-<N> Release run produces a new artifact.
on:
  pull_request_target:
    types: [closed, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    name: Backport to release branch
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: korthout/backport-action@v3
        with:
          # A PAT/App token so the backport PR triggers CI (the default
          # GITHUB_TOKEN would not). Reuses the watcher's token.
          github_token: ${{ secrets.TRINO_BUMP_TOKEN || github.token }}
          # Label form: `backport release/trino-479`
          label_pattern: '^backport (?<target>release/trino-[0-9]+)$'
          pull_title: '[backport ${target_branch}] ${pull_title}'
          pull_description: |
            Backport of #${pull_number} to `${target_branch}`.

            Remember to bump the connector version on this branch so the
            `…-trino<N>` Release artifact is new (releases are immutable).
