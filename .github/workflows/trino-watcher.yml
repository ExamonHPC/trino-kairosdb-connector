name: Trino upstream watcher

# Watches trinodb/trino for new releases. The *supported* Trino version is the
# one pinned in pom.xml (`trino.version`) on master - we control it explicitly,
# we do not auto-chase upstream. When a newer Trino appears, this workflow opens
# a DRAFT pull request that bumps the pin, and lets CI + a human do the port
# (which, in practice, also needs dependency re-pins / SPI fixes / a JDK bump).
# Merging that PR is the decision to adopt; the Release workflow then publishes.
on:
  schedule:
    - cron: '17 6 * * *'   # daily; upstream releases every ~1-2 months
  workflow_dispatch:

permissions:
  contents: write          # push the bump branch
  pull-requests: write     # open the draft PR

jobs:
  propose-bump:
    name: Propose Trino bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare upstream vs the pinned version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          latest_raw="$(gh api repos/trinodb/trino/releases/latest --jq '.tag_name')"
          latest="$(echo "$latest_raw" | grep -oE '[0-9]+' | head -n1)"
          pinned="$(grep -oE '<trino.version>[0-9]+</trino.version>' pom.xml | grep -oE '[0-9]+')"
          echo "Pinned (supported): ${pinned} | latest upstream: ${latest:-unknown}"
          if [ -n "$latest" ] && [ "$latest" -gt "$pinned" ]; then
            echo "newer=true" >> "$GITHUB_OUTPUT"
          else
            echo "newer=false" >> "$GITHUB_OUTPUT"
          fi
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          echo "pinned=${pinned}" >> "$GITHUB_OUTPUT"

      - name: Bump trino.version in pom.xml
        if: steps.check.outputs.newer == 'true'
        run: |
          set -euo pipefail
          sed -i "s|<trino.version>[0-9]\+</trino.version>|<trino.version>${{ steps.check.outputs.latest }}</trino.version>|" pom.xml
          grep -n '<trino.version>' pom.xml

      - name: Open / update draft PR
        if: steps.check.outputs.newer == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          # NOTE: PRs created with the default GITHUB_TOKEN do NOT trigger the CI
          # workflow. Provide a fine-grained PAT or GitHub App token as the
          # TRINO_BUMP_TOKEN secret so CI runs the port attempt automatically;
          # otherwise close/reopen the PR once to kick CI.
          token: ${{ secrets.TRINO_BUMP_TOKEN || github.token }}
          branch: chore/trino-${{ steps.check.outputs.latest }}
          draft: true
          commit-message: "chore: bump Trino ${{ steps.check.outputs.pinned }} -> ${{ steps.check.outputs.latest }}"
          title: "Adopt Trino ${{ steps.check.outputs.latest }}"
          labels: trino-bump
          body: |
            Upstream released **Trino ${{ steps.check.outputs.latest }}** (currently supported: ${{ steps.check.outputs.pinned }}).

            This draft bumps `trino.version`. Trino offers no cross-version SPI
            stability, so finish the port on this branch before merging - the same
            playbook every bump tends to need:

            - [ ] CI is green (`mvn -Pintegration verify`)
            - [ ] JDK bump if a `class file version` / `UnsupportedClassVersionError` appears
            - [ ] Re-pin any dependency the Trino BOM stopped managing (compile/resolve errors)
            - [ ] Port SPI / plugin-toolkit API changes (compile errors)
            - [ ] Update version references in README / Dockerfile / docker-compose

            Merging this PR adopts ${{ steps.check.outputs.latest }} as the supported
            version; the Release workflow then publishes the `…-trino${{ steps.check.outputs.latest }}` artifacts.
