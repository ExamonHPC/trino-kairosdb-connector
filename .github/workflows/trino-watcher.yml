name: Trino upstream watcher

# Watches trinodb/trino for new releases. When a version newer than our latest
# published artifact appears, it builds + tests the connector against it (via
# the reusable Release workflow) and, if green, publishes a new release.
# If the tests fail (an SPI break), it opens a tracking issue instead.
#
# Latest-only rolling model: we only ever chase the newest Trino release.
on:
  schedule:
    # Daily at 06:17 UTC. Trino releases roughly every 1-2 months, so a daily
    # poll picks up a new version within a day at negligible cost (one API call).
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      trino_version:
        description: 'Force a build of a specific Trino version (e.g. 481). Empty = auto-detect newest.'
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:
  detect:
    name: Detect new Trino version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      trino_version: ${{ steps.check.outputs.trino_version }}
    steps:
      - name: Compare upstream vs published
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCED: ${{ inputs.trino_version }}
        run: |
          set -euo pipefail

          if [ -n "$FORCED" ]; then
            echo "Forced build requested for Trino ${FORCED}"
            echo "trino_version=${FORCED}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Newest upstream Trino release (bare integer tag, e.g. 481).
          latest_raw="$(gh api repos/trinodb/trino/releases/latest --jq '.tag_name')"
          latest="$(echo "$latest_raw" | grep -oE '[0-9]+' | head -n1)"

          # Highest Trino version we have already published, parsed from our
          # release tags (`<connector>-trino<N>`); 0 if we have none yet.
          current="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" \
            --jq '[.[].tag_name | select(test("trino[0-9]+")) | capture("trino(?<n>[0-9]+)").n | tonumber] | max // 0')"

          echo "Latest upstream Trino: ${latest:-unknown} | latest published: ${current}"

          if [ -n "$latest" ] && [ "$latest" -gt "$current" ]; then
            echo "New Trino ${latest} available -> will release."
            echo "trino_version=${latest}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Already up to date; nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release for Trino ${{ needs.detect.outputs.trino_version }}
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    uses: ./.github/workflows/release.yml
    with:
      trino_version: ${{ needs.detect.outputs.trino_version }}
    permissions:
      contents: write
      packages: write
    secrets: inherit

  on-failure:
    name: File incompatibility issue
    needs: [detect, release]
    # Only when we actually attempted a release and it failed (likely SPI break).
    if: always() && needs.detect.outputs.should_release == 'true' && needs.release.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRINO_VERSION: ${{ needs.detect.outputs.trino_version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="Connector incompatible with Trino ${TRINO_VERSION}"

          # Avoid filing a duplicate on the next daily poll.
          existing="$(gh issue list --state open --search "in:title \"${title}\"" --json number --jq 'length')"
          if [ "$existing" != "0" ]; then
            echo "Tracking issue already open; skipping."
            exit 0
          fi

          # Ensure the label exists (idempotent).
          gh label create trino-compat --color B60205 --description "Trino version compatibility" 2>/dev/null || true

          {
            printf 'The automated build against **Trino %s** failed, so no release was published.\n\n' "$TRINO_VERSION"
            printf 'This usually means an SPI change in Trino %s requires connector updates.\n\n' "$TRINO_VERSION"
            printf -- '- Failing run: %s\n' "$RUN_URL"
            printf -- '- Reproduce locally: `mvn -B -Dtrino.version=%s -Pintegration verify`\n\n' "$TRINO_VERSION"
            printf 'Once fixed, re-run the **Release** workflow with `trino_version=%s`.\n' "$TRINO_VERSION"
          } > issue-body.md

          gh issue create --title "$title" --label "trino-compat" --body-file issue-body.md
