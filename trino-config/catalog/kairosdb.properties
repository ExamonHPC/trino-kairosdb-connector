## ----------------------------------------------------------------------------
## Trino catalog for KairosDB.
##
## Drop this file in <trino>/etc/catalog/ as e.g. `kairosdb.properties`; the
## catalog name (file basename) becomes the SQL-side catalog: SELECT * FROM
## kairosdb.kairosdb.<metric>.  Multiple catalogs against different KairosDB
## servers work side-by-side - declare one .properties file each.
## ----------------------------------------------------------------------------

connector.name=kairosdb

# Required: base URL of the KairosDB HTTP API.
kairosdb.url=http://kairosdb:8080

## ----- Optional knobs (defaults shown) --------------------------------------

# SQL type used for the synthetic "timestamp" column.
#   BIGINT           - epoch milliseconds (default; matches the long-running
#                      production deployment)
#   TIMESTAMP_MILLIS - SQL TIMESTAMP(3) without time zone
#   TIMESTAMP_TZ     - SQL TIMESTAMP(3) WITH TIME ZONE, in UTC
#kairosdb.timestamp.format=BIGINT

# Default look-back window when a query has no timestamp predicate.
# Overridable per-query via SET SESSION kairosdb.default_start_hours.
#kairosdb.timestamp.default-start-hours=1

# Width of one time-range split (= one KairosDB query chunk).  Smaller values
# fan the query out across more workers (more parallelism, more round-trips);
# larger values do the opposite.  Overridable per-query via
# SET SESSION kairosdb.split_size_millis.
#kairosdb.split-size=1d

# Metric-name and per-metric tag-schema cache TTL (each Trino worker keeps
# its own copy).  Keep it short if metric/tag churn is high.
#kairosdb.metadata.cache-ttl=30s

# HTTP read timeout for calls to KairosDB.
#kairosdb.read-timeout=60s

# Table-name resolution.  KairosDB is case-sensitive, Trino's SPI lowercases
# unquoted identifiers (see https://github.com/trinodb/trino/issues/17), so
# the connector reconciles by trying an exact-case match first and then
# falling back to a case-insensitive match.  Set to false to disable the
# fallback (rare; useful only when two metrics differ only in case).
#kairosdb.case-insensitive-name-matching=true
